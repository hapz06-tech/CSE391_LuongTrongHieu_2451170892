<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Tài khoản</title>
</head>
<body>
    <h2>Đăng ký thành viên</h2>
    <form action="#" method="POST">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="fullname">Họ và tên:</label>
            <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập họ và tên"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="example@email.com"><br><br>

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" pattern="{10}" placeholder="0912345678"><br><br>

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" max="2026-04-24"><br><br>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>
            <label for="username">Tên đăng nhập:</label>
            <input type="text" id="username" name="username" pattern="[A-Za-z0-9_]{3,20}" required placeholder="user_name123"><br><br>

            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" required placeholder="Ít nhất 8 ký tự, 1 hoa, 1 số"><br><br>

            <label for="repassword">Xác nhận mật khẩu:</label>
            <input type="password" id="repassword" name="repassword" required placeholder="Nhập lại mật khẩu"><br><br>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <label for="city">Thành phố:</label>
            <select id="city" name="city">
                <option value="">Chọn Thành phố</option>
                <option value="hn">Hà Nội</option>
                <option value="hcm">TP. Hồ Chí Minh</option>
                <option value="dn">Đà Nẵng</option>
                <option value="ct">Cần Thơ</option>
                <option value="hp">Hải Phòng</option>
            </select><br><br>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district">
                <option value="">Chọn Quận/Huyện</option>
                <option value="q1">Quận 1</option>
                <option value="q3">Quận 3</option>
            </select><br><br>

            <label for="address">Địa chỉ chi tiết:</label>
            <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea><br><br>

            <label>Giới tính:</label>
            <input type="radio" id="gender_m" name="gender" value="nam"> <label for="gender_m">Nam</label>
            <input type="radio" id="gender_f" name="gender" value="nu"> <label for="gender_f">Nữ</label>
            <input type="radio" id="gender_o" name="gender" value="khac"> <label for="gender_o">Khác</label>
        </fieldset>

        <br>
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">Tôi đồng ý với điều khoản sử dụng</label><br><br>

        <button type="submit">Đăng ký</button>
        <button type="reset">Nhập lại</button>
    </form>
</body>
</html>
