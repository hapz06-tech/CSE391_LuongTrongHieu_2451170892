<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia Tối Giản</title>
</head>
<body>

    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" fill="tomato" />
        <rect x="30" y="30" width="40" height="40" fill="white" />
    </svg>
    
    <h1>Giới thiệu Sản phẩm</h1>

    <figure>
        <img src="https://cdnv2.tgdd.vn/mwg-static/tgdd/Products/Images/42/329149/iphone-16-pro-max-titan-sa-mac-1-638638962337813406-750x500.jpg" alt="Mặt trước của điện thoại iPhone 16" loading="lazy" style="max-width: 100%; height: auto;">
        <figcaption>Hình 1: Thiết kế mặt trước</figcaption>
    </figure>

    <figure>
        <img src="https://cdnv2.tgdd.vn/mwg-static/tgdd/Products/Images/42/329149/iphone-16-pro-max-titan-sa-mac-2-638638962343879149-750x500.jpg" alt="Cụm camera phía sau của iPhone 16" loading="lazy" style="max-width: 100%; height: auto;">
        <figcaption>Hình 2: Chi tiết cụm camera</figcaption>
    </figure>

    <figure>
        <img src="https://cdnv2.tgdd.vn/mwg-static/tgdd/Products/Images/42/329149/iphone-16-pro-max-titan-sa-mac-5-638638962363556047-750x500.jpg" alt="Các phiên bản màu sắc của iPhone 16" loading="lazy" style="max-width: 100%; height: auto;">
        <figcaption>Hình 3: Các tùy chọn màu sắc</figcaption>
    </figure>

    <h2>Video từ YouTube</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/RfakDAwVdRw?si=FU5ba86Dy7pDq3eO" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h2>Video Thực tế</h2>
    <video controls poster="poster-image.jpg">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ thẻ video.
    </video>

    <h2>Nhạc nền giới thiệu</h2>
    <audio controls>
        <source src="background-music.mp3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ thẻ audio.
    </audio>

</body>
</html>
